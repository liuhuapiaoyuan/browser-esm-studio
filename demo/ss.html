        <script>

                { name: &quot;叮叮&quot;, icon: &quot;🔔&quot;, url: &quot;https://1500019226.vod2.myqcloud.com/6cae817cvodcq1500019226/9b5855325145403710604206076/8K8OcUpwmFoA.mp3&quot; },
                { name: &quot;咚咚&quot;, icon: &quot;🚪&quot;, url: &quot;https://1500019226.vod2.myqcloud.com/6cae817cvodcq1500019226/ff57bf3d5145403710602147778/gkm26tizIhkA.mp3&quot; },
                { name: &quot;点击&quot;, icon: &quot;👆&quot;, url: &quot;https://1500019226.vod2.myqcloud.com/6cae817cvodcq1500019226/089ade405145403710602538984/TgZ4XbmUZmkA.mp3&quot; },

                { name: &quot;警告&quot;, icon: &quot;⚠️&quot;, url: &quot;https://1500019226.vod2.myqcloud.com/6cae817cvodcq1500019226/1811d7025145403710589840436/4AzxjO5QazAA.mp3&quot; },

                { name: &quot;升级&quot;, icon: &quot;🆙&quot;, url: &quot;https://1500019226.vod2.myqcloud.com/6cae817cvodcq1500019226/b0a6b5a95145403710598588308/9FnDB3oTLAgA.mp3&quot; },
                { name: &quot;金币&quot;, icon: &quot;💰&quot;, url: &quot;https://1500019226.vod2.myqcloud.com/6cae817cvodcq1500019226/338d0edd5145403710586955040/HTyaJ435L7QA.mp3&quot; },
                { name: &quot;掌声&quot;, icon: &quot;👏&quot;, url: &quot;https://1500019226.vod2.myqcloud.com/6cae817cvodcq1500019226/67d43f9b5145403710597711118/BUB7Tg3gz3IA.mp3&quot; },

                { name: &quot;疑问&quot;, icon: &quot;❓&quot;, url: &quot;https://1500019226.vod2.myqcloud.com/6cae817cvodcq1500019226/72ea68e05145403710594118089/OTcFeVj0BH0A.mp3&quot; },

            ];
    
            const grid = document.getElementById('soundGrid');
            let currentAudio = null;
            let currentBtn = null;
    
            // 初始化页面
            sounds.forEach((sound, index) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl p-6 flex flex-col items-center justify-between h-48 relative group';
                
                card.innerHTML = `
                    <div class=&quot;text-4xl mb-2 transform group-hover:scale-110 transition-transform duration-300&quot;>${sound.icon}</div>
                    <h3 class=&quot;text-xl font-bold text-gray-800 mb-4&quot;>${sound.name}</h3>
                    
                    <div class=&quot;flex gap-3 w-full&quot;>
                        <button onclick=&quot;playSound('${sound.url}', this)&quot; class=&quot;btn-play flex-1 bg-primary text-white rounded-xl py-2 px-4 font-medium hover:bg-secondary flex items-center justify-center gap-2&quot;>
                            <svg class=&quot;w-5 h-5&quot; fill=&quot;currentColor&quot; viewBox=&quot;0 0 20 20&quot;><path d=&quot;M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z&quot; clip-rule=&quot;evenodd&quot;></path></svg>
                            试听
                        </button>
                        <button onclick=&quot;copyUrl('${sound.url}')&quot; class=&quot;flex-1 bg-white border-2 border-gray-200 text-gray-600 rounded-xl py-2 px-4 font-medium hover:border-primary hover:text-primary transition-colors flex items-center justify-center gap-2&quot;>
                            <svg class=&quot;w-5 h-5&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;><path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3&quot;></path></svg>
                            复制
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
    
            // 播放功能
            function playSound(url, btn) {
                // 如果正在播放其他音频，先停止
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                    if (currentBtn) {
                        resetBtn(currentBtn);
                    }
                }
    
                // 如果点击的是当前正在播放的按钮，则停止播放
                if (currentBtn === btn &amp;&amp; !currentAudio.paused) {
                    currentAudio = null;
                    currentBtn = null;
                    return;
                }
    
                // 播放新音频
                const audio = new Audio(url);
                
                // 更新按钮状态
                btn.innerHTML = `
                    <svg class=&quot;w-5 h-5 animate-spin&quot; fill=&quot;none&quot; viewBox=&quot;0 0 24 24&quot;>
                        <circle class=&quot;opacity-25&quot; cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;10&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;4&quot;></circle>
                        <path class=&quot;opacity-75&quot; fill=&quot;currentColor&quot; d=&quot;M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z&quot;></path>
                    </svg>
                    加载中
                `;
    
                audio.play().then(() => {
                    currentAudio = audio;
                    currentBtn = btn;
                    btn.classList.add('playing');
                    btn.innerHTML = `
                        <svg class=&quot;w-5 h-5&quot; fill=&quot;currentColor&quot; viewBox=&quot;0 0 20 20&quot;><path fill-rule=&quot;evenodd&quot; d=&quot;M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z&quot; clip-rule=&quot;evenodd&quot;></path></svg>
                        停止
                    `;
                }).catch(err => {
                    console.error(&quot;播放失败:&quot;, err);
                    resetBtn(btn);
                    showToast(&quot;播放失败，请重试&quot;, true);
                });
    
                audio.onended = () => {
                    resetBtn(btn);
                    currentAudio = null;
                    currentBtn = null;
                };
            }
    
            function resetBtn(btn) {
                btn.classList.remove('playing');
                btn.innerHTML = `
                    <svg class=&quot;w-5 h-5&quot; fill=&quot;currentColor&quot; viewBox=&quot;0 0 20 20&quot;><path d=&quot;M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z&quot; clip-rule=&quot;evenodd&quot;></path></svg>
                    试听
                `;
            }
    
            // 复制功能
            async function copyUrl(url) {
                try {
                    await navigator.clipboard.writeText(url);
                    showToast(&quot;音频链接已复制！&quot;);
                } catch (err) {
                    // 降级处理
                    const textArea = document.createElement(&quot;textarea&quot;);
                    textArea.value = url;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand(&quot;copy&quot;);
                    document.body.removeChild(textArea);
                    showToast(&quot;音频链接已复制！&quot;);
                }
            }
    
            // 提示框
            function showToast(msg, isError = false) {
                const toast = document.getElementById('toast');
                const toastMsg = document.getElementById('toastMsg');
                
                toastMsg.textContent = msg;
                if (isError) {
                    toast.querySelector('svg').classList.replace('text-green-400', 'text-red-400');
                } else {
                    toast.querySelector('svg').classList.replace('text-red-400', 'text-green-400');
                }
    
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }
